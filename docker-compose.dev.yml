services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: farline
      POSTGRES_PASSWORD: farline_dev
      POSTGRES_DB: farline
    ports:
      - "5432:5432"
    volumes:
      - farline_dev_db:/var/lib/postgresql/data

volumes:
  farline_dev_db:
